apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sciencebeam-parser--prod-cache
  namespace: sciencebeam
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: data-hub-gp3
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sciencebeam-parser--prod
  labels:
    app: sciencebeam-parser--prod
  namespace: sciencebeam
spec:
  selector:
    matchLabels:
      app: sciencebeam-parser--prod
  template:
    metadata:
      labels:
        app: sciencebeam-parser--prod
    spec:
      containers:
      - name: sciencebeam-parser
        image: ghcr.io/elifepathways/sciencebeam-parser:0.1.18 # {"$imagepolicy": "sciencebeam:sciencebeam-parser-stable"}
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8070
          protocol: TCP
        startupProbe:
          httpGet:
            path: /api/isalive
            port: http
          timeoutSeconds: 5
          periodSeconds: 30
          failureThreshold: 20
        livenessProbe:
          httpGet:
            path: /api/isalive
            port: http
          timeoutSeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/isalive
            port: http
          timeoutSeconds: 5
          periodSeconds: 30
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        volumeMounts:
        - name: cache
          mountPath: /root/.cache
      volumes:
      - name: cache
        persistentVolumeClaim:
          claimName: sciencebeam-parser--prod-cache
---
apiVersion: v1
kind: Service
metadata:
  name: sciencebeam-parser--prod
  namespace: sciencebeam
spec:
  selector:
    app: sciencebeam-parser--prod
  ports:
  - port: 8070
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sciencebeam-grobid-metadata-enricher--prod
  labels:
    app: sciencebeam-grobid-metadata-enricher--prod
  namespace: sciencebeam
spec:
  selector:
    matchLabels:
      app: sciencebeam-grobid-metadata-enricher--prod
  template:
    metadata:
      labels:
        app: sciencebeam-grobid-metadata-enricher--prod
    spec:
      containers:
      - name: sciencebeam-grobid-metadata-enricher
        image: ghcr.io/elifepathways/sciencebeam-grobid-metadata-enricher:0.0.2 # {"$imagepolicy": "sciencebeam:sciencebeam-grobid-metadata-enricher-stable"}
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          timeoutSeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          timeoutSeconds: 5
          periodSeconds: 30
        startupProbe:
          httpGet:
            path: /api/health
            port: http
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 12
        env:
        - name: GROBID_URL
          value: http://sciencebeam-parser--prod-scaler:8080/api
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-api
              key: openai_api_key
        - name: OPENAI_MODEL
          value: gpt-4o-mini
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sciencebeam-grobid-metadata-enricher--prod
  namespace: sciencebeam
spec:
  selector:
    app: sciencebeam-grobid-metadata-enricher--prod
  ports:
  - port: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sciencebeam-grobid-metadata-enricher--prod
  namespace: sciencebeam
  labels:
    app: sciencebeam-grobid-metadata-enricher--prod
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
    traefik.ingress.kubernetes.io/router.middlewares: traefik-elife-oauth@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: sciencebeam-grobid-metadata-enricher.elifesciences.org
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: sciencebeam-grobid-metadata-enricher--prod-scaler
                port:
                  number: 8080
  tls:
    - hosts:
        - sciencebeam-grobid-metadata-enricher.elifesciences.org
      secretName: sciencebeam-grobid-metadata-enricher.elifesciences.org-tls
---
apiVersion: v1
kind: Service
metadata:
  name: sciencebeam-grobid-metadata-enricher--prod-scaler
  namespace: sciencebeam
spec:
  type: ExternalName
  externalName: keda-add-ons-http-interceptor-proxy.keda.svc.cluster.local
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: sciencebeam-grobid-metadata-enricher--prod
  namespace: sciencebeam
spec:
  hosts:
  - sciencebeam-grobid-metadata-enricher.elifesciences.org
  pathPrefixes:
  - /
  scaleTargetRef:
    name: sciencebeam-grobid-metadata-enricher--prod
    kind: Deployment
    apiVersion: apps/v1
    service: sciencebeam-grobid-metadata-enricher--prod
    port: 8000
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 900
  targetPendingRequests: 5
---
