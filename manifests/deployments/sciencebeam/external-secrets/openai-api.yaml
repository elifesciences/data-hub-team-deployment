apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openai-api
  namespace: sciencebeam
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: secret-store
    kind: ClusterSecretStore
  target:
    name: openai-api
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: data-team/sciencebeam/openai-api
